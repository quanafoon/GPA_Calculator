<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <title>Calculator</title>
</head>

<body>
    <style>
        h1{
            justify-self:center;
        }
        #set{
            margin-top:10vh;
        }
        .container{
            display:flex;
            align-items:center
        }
        input{
            max-width:30vw;
            margin-left:5vw;

        }
        .material-icons{
            margin-left:5vw;
            cursor:pointer;
        }
        #submit{
            margin-left:15vw;
        }
        #result{
            margin-left:15vw;
            color:#113a6f;
        }
    </style>
    <h1>GPA Calculator</h1>
    <div id="set">
        <div class="container">
            <input id="grade" placeholder="Enter grade">
            <i id="add" onclick="addElement()" class="material-icons">add_circle</i>
        </div>
        <button id="submit" onclick="calculate()" class="btn">Submit</button>
        <a href="/calculator"><button class="btn" style="background-color:red">Reset</button></a>

    </div>
    <h3 id="result"></h3>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script>
        function addElement(){
            const inputs = document.querySelectorAll("#set input");
            const lastInput = inputs[inputs.length - 1];

            if (lastInput.value.trim() === "") {
                lastInput.focus();
                M.toast({html:"Enter a grade"});
                return;
            }
            document.getElementById("add").remove();
            const newDiv = document.createElement("div");
            const submit = document.getElementById("submit");
            const input = document.createElement("input");
            const addIcon = document.createElement("i");
            addIcon.classList.add("material-icons");
            addIcon.innerHTML = "add_circle";
            addIcon.id="add";
            addIcon.addEventListener("click", addElement);
            input.setAttribute("placeholder","Enter Grade");
            newDiv.classList.add("container");
            newDiv.appendChild(input);
            newDiv.appendChild(addIcon);
            const element = document.getElementById("set");
            element.insertBefore(newDiv, submit);
        }
    </script>
    <script>
        function calculate(){
            const grades = document.querySelectorAll("input")
            const arr = Array.from(grades).map(input => input.value);
            fetch ("/conversion", {
                method: 'POST',
                headers:{
                    'Content-type': 'application/json',
                },
                body: JSON.stringify(arr),
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById("result").innerText = `${data.toFixed(1)}`;
            })
            .catch(error => {
                console.error('Error sending data:', error);
            });
        }
    </script>
    <script>
        M.AutoInit();
    </script>
</body>
</html>
